name: Deploy to minikube
on:
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
  
jobs:
  deploy:
    name: Deploy k8s manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Install dependencies on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          if ! command -v docker &> /dev/null; then
            echo "Instalando Docker..."
            curl -fsSL https://get.docker.com | sh
            sudo usermod -aG docker $USER
            sg docker -c "docker ps"
          else
            echo "Docker ya está instalado: $(docker --version)"
          fi

          if ! command -v kubectl &> /dev/null; then
            echo "Instalando kubectl..."
            curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
            sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
            rm kubectl
          else
            echo "kubectl ya está instalado: $(kubectl version --client)"
          fi

          if ! command -v minikube &> /dev/null; then
            echo "Instalando Minikube..."
            curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
            sudo install minikube-linux-amd64 /usr/local/bin/minikube
            rm minikube-linux-amd64
          else
            echo "Minikube ya está instalado: $(minikube version)"
          fi

          if ! command -v kustomize &> /dev/null; then
            echo "Instalando kustomize..."
            curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
            sudo mv kustomize /usr/local/bin/
          else
            echo "kustomize ya está instalado: $(kustomize version)"
          fi

          EOF

      - name: Start Minikube with Calico
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          sg docker -c '
            if minikube status | grep -q "Running"; then
              echo "Minikube ya está corriendo"

              if kubectl get pods -n kube-system | grep -q "calico-node"; then
                echo "Calico ya está activo, no es necesario recrear el cluster"
              else
                echo "El cluster existe pero sin Calico, recreando..."
                minikube stop
                minikube delete

                echo "Creando cluster con Calico como CNI..."
                minikube start --driver=docker --network-plugin=cni --cni=calico --memory=4096 --cpus=2
              fi
            else
              echo "Minikube no está corriendo, iniciando con Calico..."
              minikube start --driver=docker --network-plugin=cni --cni=calico --memory=4096 --cpus=2
            fi

            echo "Esperando a que Calico este listo..."
            kubectl wait pods -n kube-system -l k8s-app=calico-node --for=condition=Ready --timeout=180s

            echo "Cluster listo con Calico activo"
          '

          EOF

      - name: Enable Minikube addons
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          sg docker -c '
            minikube addons enable ingress || true
            minikube addons enable metrics-server || true
          '

          echo "Esperando Ingress Controller..."
          kubectl wait \
            --namespace ingress-nginx \
            --for=condition=ready pod \
            --selector=app.kubernetes.io/component=controller \
            --timeout=180s

          echo "Esperando Metrics Server..."
          kubectl wait \
            --namespace kube-system \
            --for=condition=ready pod \
            --selector=k8s-app=metrics-server \
            --timeout=120s

          echo "Todos los addons están listos"

          EOF

      - name: Copy manifests to VM
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./k8s/ \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/k8s/

      - name: Apply Kubernetes manifests
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          echo "Aplicando manifiestos del overlay local..."
          kustomize build ~/k8s/overlays/local | kubectl apply -f -

          echo "Manifiestos aplicados correctamente"

          EOF

      - name: Apply monitoring stack
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          echo "Aplicando Prometheus..."
          kustomize build ~/k8s/monitoring/prometheus | kubectl apply -f -

          echo "Esperando a que Prometheus esté listo..."
          kubectl rollout status deployment/prometheus \
            -n monitoring --timeout=180s

          echo "Prometheus listo"

          EOF

      - name: Verify deployments
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          echo "=== Verificando namespace apps ==="
          kubectl rollout status deployment/auth-api -n apps --timeout=300s
          kubectl rollout status deployment/users-api -n apps --timeout=300s
          kubectl rollout status deployment/todos-api -n apps --timeout=300s
          kubectl rollout status deployment/frontend-app -n apps --timeout=300s

          echo "=== Verificando namespace messaging ==="
          kubectl rollout status deployment/redis-queue -n messaging --timeout=300s
          kubectl rollout status deployment/log-processor -n messaging --timeout=300s

          echo "=== Verificando namespace observability ==="
          kubectl rollout status deployment/zipkin-server -n observability --timeout=300s

          echo "=== Verificando namespace monitoring ==="
          kubectl rollout status deployment/prometheus -n monitoring --timeout=300s

          echo ""
          echo "=== Estado final del cluster ==="

          echo "-- Pods en apps --"
          kubectl get pods -n apps

          echo "-- Pods en messaging --"
          kubectl get pods -n messaging

          echo "-- Pods en observability --"
          kubectl get pods -n observability

          echo "-- Pods en monitoring --"
          kubectl get pods -n monitoring

          echo "-- Services --"
          kubectl get services -n apps
          kubectl get services -n messaging
          kubectl get services -n observability
          kubectl get services -n monitoring

          echo "-- Ingress --"
          kubectl get ingress -n apps

          echo "-- NetworkPolicies --"
          kubectl get networkpolicies -n apps
          kubectl get networkpolicies -n messaging
          kubectl get networkpolicies -n observability

          echo "-- HPA --"
          kubectl get hpa -n apps || true

          EOF

      - name: Setup port-forwards
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} 'bash -s' << 'EOF'

          # Matar port-forwards previos para evitar conflictos
          # si la pipeline se ejecuta varias veces
          pkill -f "port-forward.*ingress-nginx" || true
          pkill -f "port-forward.*prometheus" || true

          # Port-forward del Ingress — la aplicación principal
          nohup kubectl port-forward \
            -n ingress-nginx \
            service/ingress-nginx-controller 8080:80 \
            --address=0.0.0.0 \
            > ~/port-forward-ingress.log 2>&1 &
          echo $! > ~/port-forward-ingress.pid

          # Port-forward de Prometheus — la UI de métricas
          # Necesitas tener el puerto 9090 abierto en el
          # Security Group de Azure para acceder desde el navegador
          nohup kubectl port-forward \
            -n monitoring \
            service/prometheus 9090:9090 \
            --address=0.0.0.0 \
            > ~/port-forward-prometheus.log 2>&1 &
          echo $! > ~/port-forward-prometheus.pid

          sleep 3

          # Verificar ingress
          if kill -0 $(cat ~/port-forward-ingress.pid) 2>/dev/null; then
            echo "Ingress port-forward corriendo correctamente"
            echo "Aplicación disponible en: http://${{ secrets.AZURE_VM_HOST }}:8080"
          else
            echo "Ingress port-forward falló"
            cat ~/port-forward-ingress.log
            exit 1
          fi

          # Verificar prometheus
          if kill -0 $(cat ~/port-forward-prometheus.pid) 2>/dev/null; then
            echo "Prometheus port-forward corriendo correctamente"
            echo "Prometheus disponible en: http://${{ secrets.AZURE_VM_HOST }}:9090"
          else
            echo "Prometheus port-forward falló"
            cat ~/port-forward-prometheus.log
            exit 1
          fi

          EOF
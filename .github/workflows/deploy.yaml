name: Deploy to minikube
on:
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
  
jobs:
  deploy:
    name: Deploy k8s manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Install dependencies on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'
            
            if ! command -v docker &> /dev/null; then
              echo "Instalando Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            else
              echo "Docker ya está instalado: $(docker --version)"
            fi

            if ! command -v kubectl &> /dev/null; then
              echo "Instalando kubectl..."
              curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
              rm kubectl
            else
              echo "kubectl ya está instalado: $(kubectl version --client)"
            fi

            if ! command -v minikube &> /dev/null; then
              echo "Instalando Minikube..."
              curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
              sudo install minikube-linux-amd64 /usr/local/bin/minikube
              rm minikube-linux-amd64
            else
              echo "Minikube ya está instalado: $(minikube version)"
            fi

            # Instalamos kustomize de forma independiente
            # porque la versión integrada en kubectl a veces es
            # más antigua y puede no soportar la sintaxis de components
            if ! command -v kustomize &> /dev/null; then
              echo "Instalando kustomize..."
              curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
              sudo mv kustomize /usr/local/bin/
            else
              echo "kustomize ya está instalado: $(kustomize version)"
            fi
            
          EOF

      # NUEVO PASO: detener y recrear Minikube si no tiene Calico
      - name: Start Minikube with Calico
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            # Verificamos si Minikube está corriendo
            if minikube status | grep -q "Running"; then
              echo "Minikube ya está corriendo"

              # Verificamos si Calico está instalado como CNI.
              # Si los pods de calico-node existen, el cluster
              # ya fue creado con Calico y no necesitamos recrearlo.
              if kubectl get pods -n kube-system | grep -q "calico-node"; then
                echo "Calico ya está activo, no es necesario recrear el cluster"
              else
                echo "El cluster existe pero sin Calico."
                echo "Deteniendo cluster actual para recrearlo con Calico..."
                minikube stop
                minikube delete
                
                echo "Creando cluster con Calico como CNI..."
                minikube start \
                  --driver=docker \
                  --network-plugin=cni \
                  --cni=calico \
                  --memory=4096 \
                  --cpus=2
                  # --memory y --cpus definen cuántos recursos
                  # del host le damos a Minikube. 4GB y 2 CPUs
                  # es suficiente para todos tus servicios en local.
                  # Si la VM tiene más recursos puedes subir estos valores.
              fi
            else
              echo "Minikube no está corriendo, iniciando con Calico..."
              minikube start \
                --driver=docker \
                --network-plugin=cni \
                --cni=calico \
                --memory=4096 \
                --cpus=2
            fi

            # Esperamos a que Calico esté completamente listo.
            # Calico necesita estar operativo antes de que apliquemos
            # las NetworkPolicies, si no las crea pero no las enforcea.
            echo "Esperando a que Calico esté listo..."
            kubectl wait pods \
              -n kube-system \
              -l k8s-app=calico-node \
              --for=condition=Ready \
              --timeout=180s

            echo "Cluster listo con Calico activo"
            
          EOF

      # Habilitar addons necesarios por separado
      # Los separamos del apply de manifiestos porque necesitan
      # estar listos ANTES de que apliquemos nuestros recursos.
      - name: Enable Minikube addons
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            # Ingress Controller — enruta el tráfico externo
            # hacia los servicios dentro del cluster
            minikube addons enable ingress || true

            # Metrics Server — provee métricas de CPU y memoria
            # a Kubernetes. Sin esto el HPA no puede funcionar.
            # Es el "ojo" que le permite al HPA ver cuánto consume
            # cada pod.
            minikube addons enable metrics-server || true

            # Esperamos al Ingress Controller
            echo "Esperando Ingress Controller..."
            kubectl wait \
              --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=180s

            # Esperamos al Metrics Server
            echo "Esperando Metrics Server..."
            kubectl wait \
              --namespace kube-system \
              --for=condition=ready pod \
              --selector=k8s-app=metrics-server \
              --timeout=120s

            echo "Todos los addons están listos"
            
          EOF

      - name: Copy manifests to VM
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./k8s/ \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/k8s/

      - name: Apply Kubernetes manifests
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            # Usamos kustomize directamente en lugar de kubectl apply -k
            # porque kustomize standalone soporta mejor los components
            # que usamos para network-policies y resource-limits.
            # El resultado de kustomize build es YAML puro que
            # kubectl apply -f - lee desde stdin (el guión al final).
            echo "Aplicando manifiestos del overlay local..."
            kustomize build ~/k8s/overlays/local | kubectl apply -f -

            echo "Manifiestos aplicados correctamente"
            
          EOF

      # MODIFICADO: los namespaces ahora son tres distintos
      # así que verificamos en cada uno por separado
      - name: Verify deployments
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            echo "=== Verificando namespace microservices-app ==="
            kubectl rollout status deployment/auth-api \
              -n apps --timeout=300s

            kubectl rollout status deployment/users-api \
              -n apps --timeout=300s

            kubectl rollout status deployment/todos-api \
              -n apps --timeout=300s

            kubectl rollout status deployment/frontend \
              -n apps --timeout=300s

            echo "=== Verificando namespace microservices-messaging ==="
            kubectl rollout status deployment/redis-queue \
              -n messaging --timeout=300s

            kubectl rollout status deployment/log-processor \
              -n messaging --timeout=300s

            echo "=== Verificando namespace microservices-observability ==="
            kubectl rollout status deployment/zipkin-server \
              -n observability --timeout=300s

            echo ""
            echo "=== Estado final del cluster ==="
            echo "-- Pods en microservices-app --"
            kubectl get pods -n apps

            echo "-- Pods en microservices-messaging --"
            kubectl get pods -n messaging

            echo "-- Pods en microservices-observability --"
            kubectl get pods -n observability

            echo "-- Services --"
            kubectl get services -n apps
            kubectl get services -n messaging
            kubectl get services -n observability

            echo "-- Ingress --"
            kubectl get ingress -n apps

            echo "-- NetworkPolicies --"
            kubectl get networkpolicies -n apps
            kubectl get networkpolicies -n messaging
            kubectl get networkpolicies -n observability

            echo "-- HPA (si existen) --"
            kubectl get hpa -n apps || true
            # el || true evita que falle si todavía no hay HPAs definidos
            
          EOF

      - name: Setup port-forward
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            pkill -f "port-forward.*ingress-nginx" || true

            nohup kubectl port-forward \
              -n ingress-nginx \
              service/ingress-nginx-controller 8080:80 \
              --address=0.0.0.0 \
              > ~/port-forward.log 2>&1 &

            echo $! > ~/port-forward.pid
            echo "Port-forward iniciado con PID: $(cat ~/port-forward.pid)"

            sleep 3
            if kill -0 $(cat ~/port-forward.pid) 2>/dev/null; then
              echo "Port-forward corriendo correctamente"
              echo "Aplicación disponible en: http://${{ secrets.AZURE_VM_HOST }}:8080"
            else
              echo "Port-forward falló, revisa ~/port-forward.log"
              cat ~/port-forward.log
              exit 1
            fi
            
          EOF
name: Deploy to minikube
on:
  workflow_dispatch:
  
  push:
    branches:
      - main
    paths:
      - 'k8s/**'
  
jobs:
  deploy:
    name: Deploy k8s manifests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.AZURE_VM_HOST }} >> ~/.ssh/known_hosts

      - name: Install dependencies on VM
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'
            
            if ! command -v docker &> /dev/null; then
              echo "Instalando Docker..."
              curl -fsSL https://get.docker.com | sh
              sudo usermod -aG docker $USER
              newgrp docker
            else
              echo "Docker ya está instalado: $(docker --version)"
            fi

            if ! command -v kubectl &> /dev/null; then
              echo "Instalando kubectl..."
              curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
              sudo install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
              rm kubectl
            else
              echo "kubectl ya está instalado: $(kubectl version --client)"
            fi

            if ! command -v minikube &> /dev/null; then
              echo "Instalando Minikube..."
              curl -LO https://storage.googleapis.com/minikube/releases/latest/minikube-linux-amd64
              sudo install minikube-linux-amd64 /usr/local/bin/minikube
              rm minikube-linux-amd64
            else
              echo "Minikube ya está instalado: $(minikube version)"
            fi
            
          EOF

      - name: Copy manifests to VM
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./k8s/ \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }}:~/k8s/

      - name: Apply Kubernetes manifests
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'
            
            minikube status || minikube start --driver=docker

            # Habilitamos el addon de ingress si no está activo
            # el || true evita que falle el paso si ya estaba habilitado
            minikube addons enable ingress || true

            # Esperamos a que el ingress controller esté completamente
            # listo antes de aplicar los manifiestos, porque si aplicamos
            # el Ingress antes de que el controller exista, queda sin ADDRESS
            echo "Esperando Ingress Controller..."
            kubectl wait --namespace ingress-nginx \
              --for=condition=ready pod \
              --selector=app.kubernetes.io/component=controller \
              --timeout=180s

            kubectl apply -k ~/k8s/overlays/local
            
          EOF

      - name: Verify deployments
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'
            
            kubectl rollout status deployment/redis-queue \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/zipkin-server \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/users-api \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/auth-api \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/todos-api \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/log-processor \
              -n microservices --timeout=300s
              
            kubectl rollout status deployment/frontend-app \
              -n microservices --timeout=300s
              
            echo "--- Estado final del cluster ---"
            kubectl get pods -n microservices
            kubectl get services -n microservices
            kubectl get ingress -n microservices
            
          EOF

      - name: Setup port-forward
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.AZURE_VM_USER }}@${{ secrets.AZURE_VM_HOST }} << 'EOF'

            # Matamos cualquier port-forward previo que esté corriendo
            # para evitar conflictos de puerto si el pipeline se ejecuta
            # varias veces
            pkill -f "port-forward.*ingress-nginx" || true

            # Corremos el port-forward en background con nohup
            # nohup: mantiene el proceso vivo aunque la sesión SSH cierre
            # &: lo manda al background para que no bloquee el pipeline
            # los logs van a port-forward.log para poder debuggear si algo falla
            nohup kubectl port-forward \
              -n ingress-nginx \
              service/ingress-nginx-controller 8080:80 \
              --address=0.0.0.0 \
              > ~/port-forward.log 2>&1 &

            # Guardamos el PID para poder matarlo en el futuro si necesitamos
            echo $! > ~/port-forward.pid
            echo "Port-forward iniciado con PID: $(cat ~/port-forward.pid)"

            # Esperamos 3 segundos y verificamos que el proceso sigue vivo
            sleep 3
            if kill -0 $(cat ~/port-forward.pid) 2>/dev/null; then
              echo "Port-forward corriendo correctamente"
              echo "Aplicación disponible en: http://$HOSTNAME:8080"
            else
              echo "Port-forward falló, revisa ~/port-forward.log"
              cat ~/port-forward.log
              exit 1
            fi

          EOF
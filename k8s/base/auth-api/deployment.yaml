apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-api
  template:
    metadata:
      labels:
        app: auth-api
    spec:
      containers:
        - name: auth-api
          image: ghcr.io/andresbueno420/auth-api:latest
          ports:
            - containerPort: 8000
          env:
            - name: AUTH_API_PORT
              value: "8000"
            - name: JWT_SECRET
              value: "myfancysecret"
            - name: USERS_API_ADDRESS
              value: "http://users-api:8083"
            - name: ZIPKIN_URL
              value: "http://zipkin-server:9411/api/v2/spans"
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  rules:
    - http:
        paths:
          # /login/** → auth-api
          - path: /login(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: auth-api
                port:
                  number: 8000

          # /todos/** → todos-api
          - path: /todos(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: todos-api
                port:
                  number: 8082

          # /users/** → users-api
          - path: /users(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: users-api
                port:
                  number: 8083

          # Todo lo demás → frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-app
                port:
                  number: 8080
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: users-api
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: users-api

  minReplicas: 1
  maxReplicas: 5

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80
          # users-api es Java con Xmx512m.
          # El 80% del limit de 600Mi = ~480Mi.
          # Esto nos da margen antes de acercarnos
          # al límite de la JVM.

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 45
      # users-api es llamada por auth-api, no directamente
      # por usuarios. Los picos son más predecibles,
      # podemos ser menos agresivos subiendo.
      policies:
        - type: Pods
          value: 2
          periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: frontend-app
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: frontend

  minReplicas: 1
  maxReplicas: 6

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
          # El frontend es lo primero que golpea el usuario.
          # Escalamos más agresivo — preferimos tener
          # un pod de más antes de que el usuario sienta latencia.

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 20
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
          # Permite doblar las réplicas por minuto.
          # Con 2 réplicas puede ir a 4, con 4 a 8.
          # Más flexible que un número fijo cuando
          # no sabemos cuántas réplicas habrá en cada momento.
    scaleDown:
      stabilizationWindowSeconds: 120
      policies:
        - type: Pods
          value: 1
          periodSeconds: 60
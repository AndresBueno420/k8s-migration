apiVersion: v1
kind: ConfigMap
metadata:
  name: blackbox-exporter-config
  namespace: monitoring
data:
  config.yml: |
    modules:
      http_2xx:
        prober: http
        timeout: 5s
        http:
          valid_http_versions: ["HTTP/1.1", "HTTP/2.0"]
          valid_status_codes: [200, 401]
          # Incluimos 401 como válido porque todos-api
          # requiere auth en todas las rutas.
          # Lo que nos importa es que responde — que el
          # servicio está vivo y midiendo su latencia,
          # no el contenido de la respuesta.
          method: GET
          preferred_ip_protocol: "ip4"
apiVersion: apps/v1
kind: Deployment
metadata:
  name: blackbox-exporter
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: blackbox-exporter
  template:
    metadata:
      labels:
        app: blackbox-exporter
    spec:
      containers:
        - name: blackbox-exporter
          image: prom/blackbox-exporter:v0.24.0
          args:
            - "--config.file=/etc/blackbox/config.yml"
          ports:
            - containerPort: 9115
              # El blackbox exporter escucha aquí.
              # Prometheus le hace requests a este puerto
              # preguntando "mide la latencia de esta URL"
          volumeMounts:
            - name: config
              mountPath: /etc/blackbox
          resources:
            requests:
              cpu: "20m"
              memory: "32Mi"
            limits:
              cpu: "100m"
              memory: "64Mi"
      volumes:
        - name: config
          configMap:
            name: blackbox-exporter-config
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:

      - job_name: 'kubernetes-pods'
        kubernetes_sd_configs:
          - role: pod
        relabel_configs:
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
            action: keep
            regex: "true"
          - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - source_labels: [__meta_kubernetes_namespace]
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_pod_name]
            target_label: kubernetes_pod_name
          - source_labels: [__meta_kubernetes_pod_label_app]
            target_label: app

      - job_name: 'blackbox-http'
        # Este job usa el Blackbox Exporter para medir
        # la latencia y disponibilidad de todos-api
        # desde afuera sin necesitar autenticación interna.
        metrics_path: /probe
        params:
          module: [http_2xx]
          # Le decimos al blackbox qué módulo usar —
          # el que definimos en su ConfigMap.
        static_configs:
          - targets:
              - http://todos-api.apps.svc.cluster.local:8082
              - http://auth-api.apps.svc.cluster.local:8000
              - http://users-api.apps.svc.cluster.local:8083
              # Los servicios que queremos medir.
              # El blackbox hace una request HTTP a cada uno
              # y mide cuánto tarda en responder.
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
            # Pasa la URL como parámetro al blackbox exporter.
          - source_labels: [__param_target]
            target_label: instance
            # Guarda la URL como label "instance" en la métrica.
          - target_label: __address__
            replacement: blackbox-exporter.monitoring.svc.cluster.local:9115
            # Redirige la request de Prometheus al blackbox exporter
            # en lugar de ir directamente al servicio.
            # El blackbox es quien realmente hace el probe.

      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
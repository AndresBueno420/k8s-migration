apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources:
      - nodes
      - nodes/proxy
      - services
      - endpoints
      - pods
      # Prometheus necesita leer estos recursos para
      # descubrir automáticamente qué hay en el cluster
      # y dónde están los endpoints de métricas.
    verbs: ["get", "list", "watch"]
  - apiGroups: ["extensions", "networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - nonResourceURLs: ["/metrics"]
    # /metrics es el endpoint estándar que exponen
    # la mayoría de aplicaciones Go y muchas otras.
    # Prometheus lo llama cada scrape_interval para
    # recolectar las métricas.
    verbs: ["get"]